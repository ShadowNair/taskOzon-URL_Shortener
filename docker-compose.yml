services:
  app-memory:
    build: .
    container_name: ${APP_MEMORY_CONTAINER_NAME:-shortener-app-memory}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    command: ["/app/shortener", "-storage=memory"]
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8080}
    profiles: ["memory"]

  postgres:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER_NAME:-shortener-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shortener}
      POSTGRES_USER: ${POSTGRES_USER:-shortener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortener}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shortener} -d ${POSTGRES_DB:-shortener}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["postgres"]

  app-postgres:
    build: .
    container_name: ${APP_POSTGRES_CONTAINER_NAME:-shortener-app-postgres}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    command: ["/app/shortener", "-storage=postgres"]
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-shortener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortener}
      POSTGRES_DB: ${POSTGRES_DB:-shortener}
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["postgres"]

volumes:
  postgres_data: